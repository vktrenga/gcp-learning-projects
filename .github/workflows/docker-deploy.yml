name: Build Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        cd fastapi-mig-ci-cd-docker
        docker build -t fastapi-app .

    - name: Test Container
      run: |
        docker run -d -p 8000:8000 fastapi-app
        sleep 5
        curl http://localhost:8000
